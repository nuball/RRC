<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1428">
<title>FAQ — RRC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="app.css">
<style>
  .page { width: 100%; max-width: 420px; padding: 24px 16px 64px; }
  .page-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-back {
    font-size: 13px; color: var(--tx2); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .page-back:hover { color: #fff; }
  .page h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -.02em;
    margin-bottom: 8px;
  }
  .page-desc {
    font-size: 13px; color: var(--tx2); margin-bottom: 24px;
  }
  .faq-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .faq-q {
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    user-select: none;
    transition: background .15s;
  }
  .faq-q:hover { background: var(--surface2); }
  .faq-q-text {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex: 1;
  }
  .faq-q-icon {
    font-size: 14px;
    color: var(--tx3);
    transition: transform .2s;
  }
  .faq-item.open .faq-q-icon { transform: rotate(45deg); color: var(--tx2); }
  .faq-a {
    max-height: 0;
    overflow: hidden;
    transition: max-height .25s ease, padding .25s ease;
    color: var(--tx2);
    font-size: 13px;
    line-height: 1.7;
    padding: 0 18px;
  }
  .faq-item.open .faq-a {
    max-height: 300px;
    padding: 0 18px 18px;
  }
</style>
</head>
<body>
<div id="root">
  <div class="page fade">
    <div class="page-top">
      <a class="page-back" href="index.html">← 메인</a>
    </div>
    <h1>FAQ ❓</h1>
    <p class="page-desc">자주 묻는 질문들을 모았어요</p>

    <div id="faqList"></div>
  </div>
</div>

<script>
const FAQ = [
  {
    q: "회비는 얼마인가요?",
    a: "월 10,000원이에요. 급여에서 자동 공제처리 되고 있어요."
  },
  {
    q: "초보도 가입 가능한가요?",
    a: "물론이에요! 페이스가 빠른 사람부터 천천히 달리는 사람까지 다양해요. 자기 페이스로 즐겁게 달리면 돼요."
  },
  {
    q: "모임 주기는 어떻게 되나요?",
    a: "월 1회 모임을 진행하고 있어요. 개인 일정에 맞춰 자유롭게 참여하시면 돼요."
  },
  {
    q: "어떤 활동을 하나요?",
    a: "정기 러닝 모임, 대회 참가, 분기별 자체 이벤트 등을 진행해요."
  },
  {
    q: "대회 참가는 의무인가요?",
    a: "전혀요. 원하는 사람만 자유롭게 참가하면 돼요."
  },
  {
    q: "휴식기가 있나요?",
    a: "안전을 위해 7~8월(하계), 12~2월(동계)은 휴식기예요. 자유 러닝은 가능합니다."
  },
  {
    q: "가입은 어떻게 하나요?",
    a: "동호회 가입 신청서를 작성하셔서 재무회계팀 임영빈 책임에게 제출하시면 돼요. 문의 사항이 있으면 언제든 편하게 연락주세요."
  },
];

const list = document.getElementById('faqList');
FAQ.forEach(item => {
  const div = document.createElement('div');
  div.className = 'faq-item';
  div.innerHTML = `
    <div class="faq-q">
      <div class="faq-q-text">${item.q}</div>
      <div class="faq-q-icon">+</div>
    </div>
    <div class="faq-a">${item.a}</div>`;
  div.querySelector('.faq-q').onclick = () => div.classList.toggle('open');
  list.appendChild(div);
});
</script>
</body>
</html>
