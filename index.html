<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1428">
<title>RRC — 로케트러닝크루</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="root">
  <div class="hub fade">

    <!-- 상단 헤더 -->
    <div class="topbar">
      <div class="topbar-logo">RRC</div>
      <div class="topbar-divider"></div>
      <div class="topbar-sub">ROCKET RUNNING CREW</div>
    </div>

    <!-- 히어로 -->
    <div class="hero">
      <div class="hero-glow"></div>

      <div class="hero-char-wrap">
        <div class="hero-char-circle">
          <img src="character.png" class="hero-char" alt="로고">
        </div>
      </div>

      <div class="hero-text">
        <div class="hero-badge">
          <span class="badge-dot"></span>
          <span>세방전지 사내 러닝 동호회</span>
        </div>
        <h1>로케트 러닝 크루</h1>
        <p class="hero-tag">출근은 따로, 러닝은 함께 🚀</p>
      </div>
    </div>

    <!-- 카테고리 그리드 -->
    <div class="cat-grid">
      <a class="cat-card" href="https://rrc-race.vercel.app">
        <div class="cat-icon-wrap">
          <img src="icon-race.png" class="cat-icon-img" alt="대회">
        </div>
        <div class="cat-name">대회</div>
        <div class="cat-desc">참가 대회 기록 & PB</div>
      </a>
      <a class="cat-card" href="#" id="eventBtn">
        <div class="cat-icon-wrap">
          <img src="icon-event.png" class="cat-icon-img" alt="이벤트">
        </div>
        <div class="cat-name">이벤트</div>
        <div class="cat-desc">런럭 · 로또런</div>
      </a>
      <a class="cat-card" href="gallery.html">
        <div class="cat-icon-wrap">
          <img src="icon-gallery.png" class="cat-icon-img" alt="갤러리">
        </div>
        <div class="cat-name">갤러리</div>
        <div class="cat-desc">대회 · 정기모임</div>
      </a>
      <a class="cat-card" href="faq.html">
        <div class="cat-icon-wrap">
          <img src="icon-faq.png" class="cat-icon-img" alt="FAQ">
        </div>
        <div class="cat-name">FAQ</div>
        <div class="cat-desc">자주 묻는 질문</div>
      </a>
    </div>

    <!-- 푸터 -->
    <div class="foot">
      <div class="foot-line"></div>
      <div class="foot-text">© ROCKET RUNNING CREW</div>
    </div>

  </div>

  <!-- 이벤트 선택 모달 -->
  <div class="modal" id="eventModal">
    <div class="modal-body">
      <h3>이벤트 선택</h3>
      <a class="event-link" href="https://rrc-runluck.vercel.app">
        <span class="event-icon">🎟</span>
        <div class="event-info">
          <div class="event-name">런럭 RUN&LUCK</div>
          <div class="event-desc">매일 달리고 추첨권 받기</div>
        </div>
        <span class="event-arrow">→</span>
      </a>
      <a class="event-link" href="https://rrc-lotto.vercel.app">
        <span class="event-icon">🎱</span>
        <div class="event-info">
          <div class="event-name">로또런 LOTTO RUN</div>
          <div class="event-desc">번호 선택해서 토요일 추첨</div>
        </div>
        <span class="event-arrow">→</span>
      </a>
      <button class="modal-close" id="modalClose">닫기</button>
    </div>
  </div>
</div>

<script>
const eventBtn = document.getElementById('eventBtn');
const modal = document.getElementById('eventModal');
const modalClose = document.getElementById('modalClose');

eventBtn.onclick = (e) => { e.preventDefault(); modal.classList.add('on'); };
modalClose.onclick = () => modal.classList.remove('on');
modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('on'); };
</script>
</body>
</html>
