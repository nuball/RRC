<!DOCTYPE html>

<body>
<div id="root">
  <div class="hub fade">

    <!-- 상단 헤더 -->

      <div class="topbar-logo">RRC</div>
      <div class="topbar-divider"></div>
      <div class="topbar-sub">ROCKET RUNNING CREW</div>
    </div>

    <!-- 히어로 -->
    <div class="hero">
      <div class="hero-glow"></div>

      <div class="hero-char-wrap">
        <div class="hero-char-circle" id="charBtn">
          <img src="character.png" class="hero-char" alt="로고">
          <div class="speech-bubble" id="speechBubble"></div>
        </div>
      </div>

      <div class="hero-text">
        <div class="hero-badge">
          <span class="badge-dot"></span>
          <span>세방전지 러닝 동호회</span>
        </div>
        <h1>로케트 러닝 크루</h1>
        <p class="hero-tag">출근은 따로, 러닝은 함께 🚀</p>
      </div>
    </div>

    <!-- 카테고리 그리드 -->
    <div class="cat-grid">
      <a class="cat-card" href="https://rrc-race.vercel.app/">
        <div class="cat-icon-wrap">
          <img src="icon-race.png" class="cat-icon-img" alt="대회">
        </div>
        <div class="cat-name">대회</div>
        <div class="cat-desc">완주를 향하여</div>
      </a>
      <a class="cat-card" href="https://rrc-events.vercel.app/">
        <div class="cat-icon-wrap">
          <img src="icon-event.png" class="cat-icon-img" alt="이벤트">
        </div>
        <div class="cat-name">이벤트</div>
        <div class="cat-desc">재밌게 뛰어요</div>
      </a>
      <a class="cat-card" href="https://rrc-gallery.vercel.app/">
        <div class="cat-icon-wrap">
          <img src="icon-gallery.png" class="cat-icon-img" alt="갤러리">
        </div>
        <div class="cat-name">갤러리</div>
        <div class="cat-desc">내 맘 속에 저장</div>
      </a>
      <a class="cat-card" href="faq.html">
        <div class="cat-icon-wrap">
          <img src="icon-faq.png" class="cat-icon-img" alt="FAQ">
        </div>
        <div class="cat-name">FAQ</div>
        <div class="cat-desc">자주 묻는 질문</div>
      </a>
    </div>

    <!-- 푸터 -->
    <div class="foot">
      <div class="foot-line"></div>
      <div class="foot-text">© ROCKET RUNNING CREW · SINCE 2026.05.01</div>
      <div class="foot-disclaimer">본 사이트는 세방전지 임직원들이 자발적으로 운영하는<br>사내 러닝 크루 공간이며, 회사의 공식 웹사이트가 아닙니다.</div>
    </div>

  </div>
</div>

<script>
// 임시 준비 중 페이지 - 모달 사용 안 함
</script>
<script>
// 캐릭터 클릭 시 말풍선
const charBtn = document.getElementById('charBtn');
const bubble = document.getElementById('speechBubble');

const messages = [
  "오늘도 화이팅! 🏃",
  "한 걸음 더!",
  "수고하셨어요 💪",
  "달려봅시다 🚀",
  "함께 가요!",
  "땀이 곧 PB!",
  "오늘의 러닝 가즈아 🔥",
  "달리는 자, 빛난다 ✨",
  "한 걸음씩, 끝까지!",
  "RRC 최고 🚀"
];

let bubbleTimer;

charBtn.addEventListener('click', (e) => {
  // 랜덤 메시지
  const msg = messages[Math.floor(Math.random() * messages.length)];
  bubble.textContent = msg;
  bubble.classList.remove('show');
  void bubble.offsetWidth; // reflow
  bubble.classList.add('show');

  // 살짝 눌린 효과
  charBtn.classList.add('pressed');
  setTimeout(() => charBtn.classList.remove('pressed'), 150);

  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('show');
  }, 2000);
});
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
